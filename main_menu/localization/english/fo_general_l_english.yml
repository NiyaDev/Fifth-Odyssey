  fo_fifth_odyssey.24.desc: "A noble family has approached our organization with a proposition, they will give us a payment and workers in exchange for their places saved on the expedition.\n\nTheir workers, while willing to join the journey, remain loyal to their lords and will not leave without them."
  fo_fifth_odyssey.24.a: "Accept their proposition"
  fo_fifth_odyssey.24.aa: "10 Nobles and 100 Laborers join us"
  fo_fifth_odyssey.24.b: "The price for us is too steep"
  fo_fifth_odyssey.24.bb: "Nothing happens"

  # Goals
  # Before leaving
  fo_bl_goals.1.entry: "A Noble Goal"
  fo_bl_goals.1.title: "A Noble Goal"
  fo_bl_goals.1.desc: "We have gathered a large number of Nobles in our mission to leave this collapsing empire.\n\nPerhaps we may even be the reson for the collapse ourselves."
  fo_bl_goals.1.a: "We are the inheritors of the Empire"
  fo_bl_goals.2.entry: "A Clerical Error"
  fo_bl_goals.2.title: "A Clerical Error"
  fo_bl_goals.2.desc: "While abandoning our kin is not exactly what Jesus would do, we have gathered a large number of Clergymen and philosophers in our efforts to leave our crumbling empire."
  fo_bl_goals.2.a: "God wills it!"
  fo_bl_goals.3.entry: "Burghers go well with Fries"
  fo_bl_goals.3.title: "Burghers go well with Fries"
  fo_bl_goals.3.desc: "While it is difficult to convice members of the Clergy to join us, and the Nobles have a lot to lose. Burghers have everything to gain by joining us; New land, new riches, and most importantly, less entrenched competition."
  fo_bl_goals.3.a: "The almighty Ducat prevails"
  fo_bl_goals.4.entry: "Kneel Peasants!"
  fo_bl_goals.4.title: "Kneel Peasants!"
  fo_bl_goals.4.desc: "The easiest group to convince is the average member of the empire. Crushed by tyranny of the crown and nobles alike, forced to work their lives away for wealth they themselves will never see. All we had to do is promise them emancipation from serfdom and they were more than happy to join.\n\nNow, whether we keep that promise is entirely up to us."
  fo_bl_goals.4.a: "Let's see where this goes..."
  fo_bl_goals.5.entry: "An army fit for a colony!"
  fo_bl_goals.5.title: "An army fit for a colony!"
  fo_bl_goals.5.desc: "Bringing any group of people brings with it potential dangers, biggest of all is their belief that because they had power in the empire, that means they should have power in our new home as well. The wealthier of our members might even bring their own private guards and soldiers to ensure their power is kept.\n\nWhich is why we must also follow suit to ensure we keep control of our investment."
  fo_bl_goals.5.a: "Hold the line!"

