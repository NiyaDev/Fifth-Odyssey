l_english:
 # Events
 fifth_odyssey_events.11.title: "The Fifth Odyssey"
 fifth_odyssey_events.11.desc: "The year is 1337 AD. The people of The Eastern Roman empire eye the growing power of the Ottoman Turks with fear. Their fears are left ignored by the Emperor who only sees land to reclaim.\n\nAs tensions rise, a group of nobles pool their wealth and populations together to plan an escape eastward. Aside from passing the Pillars of Hercules, there is no plan, only survival.\n\nWhat will they find in the open ocean?"
 fifth_odyssey_events.11.a: "Our fears are unfounded. Let us remain."
 fifth_odyssey_events.11.b: "Fly you fools!"
 fifth_odyssey_events.11.e: "To Elysium we go!"

 # Modifiers
 #STATIC_MODIFIER_NAME_noble_flight: "Noble Flight"
 #STATIC_MODIFIER_NAME_fo_edge_fear: "Afraid of the Edge of the World"
 #STATIC_MODIFIER_NAME_fo_edge_fear.desc: "The Greek exodus resulted in the death of all involved by falling off the world. There is no need to risk our peoples lives for a useless venture."
 STATIC_MODIFIER_NAME_fo_lied_por: "Lied to the Europeans"
 STATIC_MODIFIER_NAME_fo_lied_por.desc: "We lied to the Iberians, claiming our exodus failed with our deaths at the edge of the world. They are less likely to follow us."
 STATIC_MODIFIER_NAME_fo_truth_por: "Told the truth to the Europeans"
 STATIC_MODIFIER_NAME_fo_truth_por.desc: "We told the truth to the Iberians, that we continued past the supposed \"End of the World\" and lived."
 STATIC_MODIFIER_NAME_fo_knowledge: "Ancient Knowledge"
 STATIC_MODIFIER_NAME_fo_knowledge.desc: "We brought with us countless books from the now destroyed Imperial Library. They may contain knowledge that will help us in the coming years."
 STATIC_MODIFIER_NAME_fo_silk: "Byzantine Silk"
 STATIC_MODIFIER_NAME_fo_silk.desc: "We managed to obtain viable Silk worms and if we can settle ourselves wherever we land we can restore the industry."
 STATIC_MODIFIER_NAME_fo_horses: "Horses"
 STATIC_MODIFIER_NAME_fo_horses.desc: "Despite the hardships, we brought along Horses to our new home and now we prepare to start breeding."


