 fo_noble_flight_leave: "Flee the Empire"
 fo_noble_flight_leave_desc: "It is time for us to leave the Empire.\nHopefully we have all we need for the journey."

 fo_noble_flight_sell_burghers: "Sell titles to $burghers$"
 fo_noble_flight_sell_burghers_desc: "Sell titles to the $burghers$. Trading our own influence for money."

