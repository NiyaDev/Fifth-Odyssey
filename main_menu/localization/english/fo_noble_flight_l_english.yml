 # Events
 fo_noble_flight.1.title: "Who shall lead us?"
 fo_noble_flight.1.desc: "Among the Nobility of the empire, there are many of those with the abilities necesary to lead us to a new home. However, it is another question all together whether or not any are willing to leave everything behind even with the lingering threats. Three main candidates have been put forward.\n\n[GetCharacter('fo_romaboo').GetName]: The eldest Daughter of an up and coming family. What she lacks in resources she makes up for in a desire to prove herself and a deep knowledge of the old ways.\n[GetCharacter('fo_byzaboo').GetName]: A middle child of an old family that, if you take his word for it, is the true heirs of the Empire. The claims are dubious at best, but no one can say he is not dedicated.\n[GetCharacter('fo_alexaboo').GetName]: Despite not being a noble himself, he is possibly the greatest tactician in the Empire with some even comparing him to Alexander the Great himself. The sole reason he is not leading armies for the Emperor is because of his low status he is seen as \"Impure breeding\". For our situation, however, he may prove to be useful."
 fo_noble_flight.1.a: "[GetCharacter('fo_romaboo').GetName], The Daughter of Rome"
 fo_noble_flight.1.b: "[GetCharacter('fo_byzaboo').GetName], The Heir to the Empire"
 fo_noble_flight.1.c: "[GetCharacter('fo_alexaboo').GetName], Alexander reborn"

 fo_noble_flight.10.title: "Financing shipwrights"
 fo_noble_flight.10.desc: "The burgher shipwrights are more than willing to build ships with no questions asked. For the right price.\nNow the only question is what type of ship to construct."
 fo_noble_flight.10.a: "Light ship"
 fo_noble_flight.10.aa: "Construct a light ship to protect the transport ships. Cost: 40"
 fo_noble_flight.10.b: "Resource transport"
 fo_noble_flight.10.bb: "Construct a transport ship designed to carry heavy loads of valuables to help us wherever we land. Cost: 50"
 fo_noble_flight.10.c: "Population transport"
 fo_noble_flight.10.cc: "Construct a transport ship designed to carry as many people as possible. Cost: 30"
 fo_noble_flight.10.d: "Stop building"

 fo_noble_flight.11.title: "Knowledge of our forebearers"
 fo_noble_flight.11.desc: "The largest collection of Greek literature, the Imperial Library of Constantinople, was destroyed in 1204 by the French and Venetians. The French were a more barbaric people then, so it is unlikely any of the texts they looted remain. The Venetians for all their flaws know value when they see it. Members of our group have put forward the idea of apporaching the Doge in an attempt to retrieve texts that may be of value.\nAll it requires is a little capital and some pulled strings."
 fo_noble_flight.11.a: "Pay them handsomely"
 fo_noble_flight.11.b: "Try to convince them"
 fo_noble_flight.11.c: "We refuse to pay or beg for OUR texts"
 fo_noble_flight.12.title_s: "The Venetians accepted!"
 fo_noble_flight.12.desc_s: "The Venetians generously accepted our request for the tomes, claiming no real desire to go through countless books that will more than likely go nowhere."
 fo_noble_flight.12.title_f: "The Venetians refused!"
 fo_noble_flight.12.desc_f: "The contemptuious Venetians denied us, claiming while they had no desire to flip through dusty tomes without a guarantee of profit. Our interest in them has made them curious what exactly they have."
 fo_noble_flight.12.a: "Fetch the ships!"
 fo_noble_flight.12.b: "Those villains!"

 fo_noble_flight.13.title: "Horses?"
 fo_noble_flight.13.desc: "The wife of one of the members of our inner circle came to us in private to ask us for a personal favor. She is very interested in animal husbandry, specifically Horses. Her father had spent all of his free tome breeding horses and when he passed she continued his work. She claims that all of her Horses are all very good stock and she wishes to not have to leave her and her father's lives work here as she leaves with us to wherever we end up. We could use some of our funds to commision ships to hold her most prized Mares and Stallions and when we arrive she might be able to start us on a path of equestrian dominance matched only by the Mongols themselves.\nAt least, that's what she says."
 fo_noble_flight.13.a: "Horses"
 fo_noble_flight.13.aa: "Cost: 40"
 fo_noble_flight.13.b: "No"

 fo_noble_flight.14.title: "Purple Gold"
 fo_noble_flight.14.desc: "For almost a thousand years the Empire has been the only source of Silk other than China itself. Holding it as a closely guarded secret and limiting supply to further increase it's value.\nDespite it being a luxary, many of the nobles in our group are urging our leader to make an attempt to get some worms for ourselves to prove our legitimacy as Romans. The Emperor, however, might not be too keen to give it to us.\nPerhaps if we offer payment to the Government we could perhaps \"House\" Silk worms for the future of the Empire.\nIronically, it might be easier and cheaper to steal it yet again..."
 fo_noble_flight.14.a: "We're gonna steal the Silk worms of the Byzantine Empire"
 fo_noble_flight.14.aa: "Time to plan a heist"
 fo_noble_flight.14.b: "We are above robbery"
 fo_noble_flight.14.bb: "Approach the Government with an offer"
 fo_noble_flight.14.c: "This is a pointless endeaver"
 fo_noble_flight.14.cc: "Abandon the idea of bringing Silk with us"
 fo_noble_flight.15.title_s: "The Government Accepted our offer!"
 fo_noble_flight.15.desc_s: "The Government of our Empire has graciously accepted our offer for payment of loads in exchange for a collection of silk worms for our exodus."
 fo_noble_flight.15.title_f: "The Government Denied our petition!"
 fo_noble_flight.15.desc_f: "Despite our finest offers, the government has refused our petition to house some of the "
 fo_noble_flight.15.a: "May the Pheonix Rise again"
 fo_noble_flight.15.b: "Damn them!"
 fo_noble_flight.17.title: "Planning the Heist"
 fo_noble_flight.17.desc: "The first step of any good heist is gathering a good crew, but the best are expensive and every coin we spend on stealing Silk Worms of all things is coin we don't spend of rations or ships."
 fo_noble_flight.17.a: "We will only hire the best"
 fo_noble_flight.17.aa: "Cost: 60"
 fo_noble_flight.17.b: "Maybe \"Sufficiant\" is enough"
 fo_noble_flight.17.bb: "Cost: 30"
 fo_noble_flight.17.c: "I've heard of some riffraff in the capital who might want to prove themselves"
 fo_noble_flight.17.cc: "Cost: 5"
 fo_noble_flight.17.d: "Damn it, We'll do it ourselves!"
 fo_noble_flight.17.dd: "Take on the responsibility, and risk, ourself"
 fo_noble_flight.17.e: "I take it back"
 fo_noble_flight.17.ee: "We will review our options"
 fo_noble_flight.18.title: "Preperations"
 fo_noble_flight.18.desc: "We have a crew, for better or worse, and now we need a plan. Members of our group have devised a few different "
 fo_noble_flight.18.a: "Bribe the Guards"
 fo_noble_flight.18.cc: "Cost: 20"
 fo_noble_flight.18.b: "Invest in some equipment"
 fo_noble_flight.18.cc: "Cost: 10"
 fo_noble_flight.18.c: "Pay for overtime to stake the place out"
 fo_noble_flight.18.cc: "Cost: 10"
 fo_noble_flight.18.d: "Finalize Preperations"
 fo_noble_flight.19.title: "Let it begin"
 fo_noble_flight.19.desc: "Our agents have started they plan and now we just"
 fo_noble_flight.19.a: "Only time will tell"
 fo_noble_flight.19.aa: "Hacker"
 fo_noble_flight.19.ab: "We have a very low chance of success"
 fo_noble_flight.19.ac: "We have a low chance of success"
 fo_noble_flight.19.ad: "We have a mediocre chance of success"
 fo_noble_flight.19.ae: "We have a good chance of success"
 fo_noble_flight.19.af: "We can't fail!"
 fo_noble_flight.20.title_s: "The Heist was a success!"
 fo_noble_flight.20.desc_s: "Our agents have successfully stolen Silk worms and now we store them away until our exodus."
 fo_noble_flight.20.title_f: "The heist Failed!"
 fo_noble_flight.20.desc_f: "The scum we hired failed to steal anything of value. And now we have to prepare to defend ourselves if they decide to reveal our involvement."
 fo_noble_flight.20.a: "I never had a doubt"
 fo_noble_flight.20.b: "I always knew it would fail!"

 fo_noble_flight.100.title: "Finalizing the journey"
 fo_noble_flight.100.desc: "The time has come and the ships are stocked. The fleet, led by The Exodus and it's leader [SituationView.GetActiveSituation.GetSituation.MakeScope.GetVariable('current_leader').GetValue|2], finally leaves their stations across the empire meeting up off the coast of Achaea."
 fo_noble_flight.100.a: "The journey has begun..."

 fo_noble_flight.101.title: "Finalizing the Journey"
 fo_noble_flight.101.desc: "The time has come and the ships are stocked. The fleet, led by The Exodus and it's leader [SituationView.GetActiveSituation.GetSituation.MakeScope.GetVariable('current_leader').GetValue|2], finally leaves their stations across the empire meeting up off the coast of Achaea."
 fo_noble_flight.101.a: "The journey has begun..."
 fo_noble_flight.102.title: "A foreign fleet"
 fo_noble_flight.102.desc: "The fleet was halfway through the Mediterranean before they even saw another vessal, let alone encountered them. The crew stood nervous as a Genoese ships approached. Our leader talked with their captain in private for a bit..."
 fo_noble_flight.102.aa: "A productive meeting."
 fo_noble_flight.102.a: "[GetCharacter('fo_romaboo').GetName] negotiated a resupply and some backup in exchange for assisting in the transport of cargo to Portugal."
 fo_noble_flight.102.b: "[GetCharacter('fo_byzaboo').GetName] offered the captain and his crew their own place in the sun. The Genoese decided to turncoat. Joining their fleet to our exodus."
 fo_noble_flight.102.c: "[GetCharacter('fo_alexaboo').GetName] negotiated additional cargo vessals in exchange for tactical assistance in dealing with the Tunisian pirates."
 fo_noble_flight.103.title: "The Pillars of Hercules"
 fo_noble_flight.103.desc: "We have finally reached the end of the first leg of our journey: The boundary of the Mediterranean Sea, the Pillars of Hercules. Currently held in the hands of the Castillans to the north and Marinid Muslims to the south. Beyond this point we are journeying into the unknown."
 fo_noble_flight.103.a: "Onward!"
 fo_noble_flight.104.title: "Pirates!"
 fo_noble_flight.104.desc: "From the moment we approached Iberia our crew was nervous at the potential of a raid by the Morrocans. And despite the relief when we passed the Pillars, that relief was destroyed as a small fleet of raiders came over the horizon, coming directly for us."
 fo_noble_flight.104.a: "Take the Offense!"
 fo_noble_flight.104.b: "Defensive Positions!"
 fo_noble_flight.104.c: "Flee!"
 fo_noble_flight.104.d: "[SituationView.GetActiveSituation.GetSituation.MakeScope.GetVariable('current_leader').GetValue|2] prepared for just this occasion..."
 fo_noble_flight.105.title_p: "Overwhelming Victory!"
 fo_noble_flight.105.desc_p: "Through a combination of training and planning we have not only managed to beat the Moorish pirate fleet, but we have turned the tables and taken many of them prisoner as well as taking many of their ships to bolster our numbers and resources."
 fo_noble_flight.105.title_s: "Victory!"
 fo_noble_flight.105.desc_s: "Through blood, we've managed to beat back the attackers and send a message to the Morrocans that we are not easy pickings and we will defend ourselves."
 fo_noble_flight.105.title_f: "Retreat!"
 fo_noble_flight.105.desc_f: "Despite our best efforts, we only managed to escape the pirate fleet by the skin of our teeth. Losing multiple ships and too many people."
 fo_noble_flight.105.a: "Glory to the Exodus!"
 fo_noble_flight.105.b: "We still have a long way to go!"
 fo_noble_flight.105.c: "We flee to the open sea..."
 fo_noble_flight.106.title: "The Portuguese"
 fo_noble_flight.106.desc: "Not too long after dealing with the pirates, another fleet appeared on the horizon. This time waving the Flag of Portugal. Their captain had apparently gotten word of not only our talks with the Genoese, but also our fight with the Morrocans and they offered a resupply in exchange for sending back reports of what we find. After a moment of contemplation, they respond..."
 fo_noble_flight.106.a: "Accept the deal and report the truth of what we find."
 fo_noble_flight.106.b: "Accept the deal, but lie. They must believe we perished, or else they may follow us."
 fo_noble_flight.106.c: "Refuse the deal. We will continue our journey without any assistance."
 fo_noble_flight.107.title: "The open sea"
 fo_noble_flight.107.desc: "The days are long and hot, and despite our apparent speed we have yet to see land in many weeks. Perhaps the old legends are wrong. Perhaps we took a wrong turn. Doubt spreads about the fleet as many question if this was really worth it. Were the Turks and Slavs truely that big of a threat? Or were we over-reacting and we have just ended up killing ourselves over nothing..."
 fo_noble_flight.107.a: "I'm so thirsty"
 fo_noble_flight.108.title: "The Storm"
 fo_noble_flight.108.desc: "Just when we thought ourselves in dire straights, dark clouds were spotted on the horizon. A storm quickly rolled in and there was noting we could do to prepare for a storm of this magnitude. The waves beating on the ships, rain flying sideways torwards us, some even claimed to see an entire ship get picked up by the wind and thrown out of view. But when asked, no one could remember the name.\n Eventually though, as all storms do, it passed. The remaining members of our fleet took headcount and inventory and despite the severety we managed to get through unharmed. The religious of those claimed it was their prayers to God that saved them, others, in private claimed they recited prayers to Poseidon and that was what quelled the storm. Ahead of us a glowing ball of light seemingly guides our way.\nRegardless of the why or how, with the dark clouds behind us and hope on the horizon, We move forward."
 fo_noble_flight.108.a: "To journey's end"
 fo_noble_flight.109.title: "The end of our rope"
 fo_noble_flight.109.desc: "Many more days pass, and with rationing getting stricter and stricter many in the fleet are falling back into their doubt. Days pass and pass, but nothing but empty sky and seas, until one early morning the nivgator heard the distinctive call of a sea bird, a sound not heard in months. Quickly they change course to follow it and soon enough, as the majority of the crew awakens they are greeted with a wonderous view."
 fo_noble_flight.109.a: "Land ho!"
 fo_noble_flight.110.title: "A new Home"
 fo_noble_flight.110.desc: "After navigating into what seems like a very sizable bay. The ships weigh anchor as close to shore as they can and most of the crew disembark to expore and start building camp. As they do, many of the explorers and builders alike notice figures at the edge of their vision, at first they believed it was halucinations do to excitement, hunger, and all they time at sea. But sure enoguh the figure begun to be seen closer and close to camp until a group of darker skinned peoples wearing animal hides approached our peoples. They appeared to have weapons ready, but not drawn. One member of their group, wearing an extragant headress moves to the front of the group and attempts to speak, but no one amoungst understood. Our leader gathered a few members of ours who were multilingual had set them on the task of learning how to communicate with these people."
 fo_noble_flight.110.a: "We are few in numbers, we cant afford a war."
 fo_noble_flight.111.title: "Communication"
 fo_noble_flight.111.desc: "Eventually the language barrier was eroded and we learned this group of people call themselves the Tsenacommacah. From them we learned of the native plants and animals in the area, allowing for us to safely forage and hunt. We communicated our intention of settling in the area and they seemed to be understanding. Despite their people's nomadic nature, they apparently have traded with another tribe to the north who also have settled and started farming for themselves as well as stories of a great civilization far to thw west. As the tribe and their leader prepare to migrate, some of them have asked to remain with our people, joining us."
 fo_noble_flight.111.a: "Their chief has given his blessings, and we could use the people."
 fo_noble_flight.112.title: "The founding of a new civilization"
 fo_noble_flight.112.desc: "With the help of our new allies, we have founded a fledgling city from which we hope to begin anew."
 fo_noble_flight.112.a: "Glory to Nea Rhomania"

