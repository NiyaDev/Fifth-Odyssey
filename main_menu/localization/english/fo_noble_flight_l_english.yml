 # Events
 fo_noble_flight.1.title: "Who shall lead us?"
 fo_noble_flight.1.desc: "Among the Nobility of the empire, there are many of those with the abilities necesary to lead us to a new home. However, it is another question all together whether or not any are willing to leave everything behind even with the lingering threats. Three main candidates have been put forward.\n\n[GetCharacter('fo_romaboo').GetName]: The eldest Daughter of an up and coming family. What she lacks in resources she makes up for in a desire to prove herself and a deep knowledge of the old ways.\n[GetCharacter('fo_byzaboo').GetName]: A middle child of an old family that, if you take his word for it, is the true heirs of the Empire. The claims are dubious at best, but no one can say he is not dedicated.\n[GetCharacter('fo_alexaboo').GetName]: Despite not being a noble himself, he is possibly the greatest tactician in the Empire with some even comparing him to Alexander the Great himself. The sole reason he is not leading armies for the Emperor is because of his low status he is seen as \"Impure breeding\". For our situation, however, he may prove to be useful."
 fo_noble_flight.1.a: "[GetCharacter('fo_romaboo').GetName], The Daughter of Rome"
 fo_noble_flight.1.b: "[GetCharacter('fo_byzaboo').GetName], The Heir to the Empire"
 fo_noble_flight.1.c: "[GetCharacter('fo_alexaboo').GetName], Alexander reborn"

 fo_noble_flight.10.title: "Financing shipwrights"
 fo_noble_flight.10.desc: "The burgher shipwrights are more than willing to build ships with no questions asked. For the right price.\nNow the only question is what type of ship to construct."
 fo_noble_flight.10.a: "Light ship"
 fo_noble_flight.10.aa: "Construct a light ship to protect the transport ships. Cost: 40"
 fo_noble_flight.10.b: "Resource transport"
 fo_noble_flight.10.bb: "Construct a transport ship designed to carry heavy loads of valuables to help us wherever we land. Cost: 50"
 fo_noble_flight.10.c: "Population transport"
 fo_noble_flight.10.cc: "Construct a transport ship designed to carry as many people as possible. Cost: 30"
 fo_noble_flight.10.d: "Stop building"

 fo_noble_flight.11.title: "Knowledge of our forebearers"
 fo_noble_flight.11.desc: "The largest collection of Greek literature, the Imperial Library of Constantinople, was destroyed in 1204 by the French and Venetians. The French were a more barbaric people then, so it is unlikely any of the texts they looted remain. The Venetians for all their flaws know value when they see it. Members of our group have put forward the idea of apporaching the Doge in an attempt to retrieve texts that may be of value.\nAll it requires is a little capital and some pulled strings."
 fo_noble_flight.11.a: "Pay them handsomely"
 fo_noble_flight.11.b: "Try to convince them"
 fo_noble_flight.11.c: "We refuse to pay or beg for OUR texts"

 fo_noble_flight.12.title: "The Venetians accepted!"
 fo_noble_flight.12.desc: "The Venetians generously accepted our request for the tomes, claiming no real desire to go through countless books that will more than likely go nowhere."
 fo_noble_flight.12.a: "Fetch the ships!"
 fo_noble_flight.13.title: "The Venetians refused!"
 fo_noble_flight.13.desc: "The contemptuious Venetians denied us, claiming while they had no desire to flip through dusty tomes without a guarantee of profit. Our interest in them has made them curious what exactly they have."
 fo_noble_flight.13.a: "Those villains!"

 fo_noble_flight.14.title: "Purple Gold"
 fo_noble_flight.14.desc: "For almost a thousand years the Empire has been the only source of Silk other than China itself. Holding it as a closely guarded secret and limiting supply to further increase it's value.\nDespite it being a luxary, many of the nobles in our group are urging our leader to make an attempt to get some worms for ourselves to prove our legitimacy as Romans. The Emperor, however, might not be too keen to give it to us.\nPerhaps if we offer payment to the Government we could perhaps \"House\" Silk worms for the future of the Empire.\nIronically, it might be easier and cheaper to steal it yet again..."
 fo_noble_flight.14.a: "We're gonna steal the Silk worms of the Byzantine Empire"
 fo_noble_flight.14.aa: "Time to plan a heist"
 fo_noble_flight.14.b: "We are above robbery"
 fo_noble_flight.14.bb: "Approach the Government with an offer"
 fo_noble_flight.14.c: "This is a pointless endeaver"
 fo_noble_flight.14.cc: "Abandon the idea of bringing Silk with us"
 fo_noble_flight.15.title: "The Government Accepted our offer!"
 fo_noble_flight.15.desc: "The Government of our Empire has graciously accepted our offer for payment of loads in exchange for a collection of silk worms for our exodus."
 fo_noble_flight.15.a: "May the Pheonix Rise again"
 fo_noble_flight.16.title: "The Government Denied our petition!"
 fo_noble_flight.16.desc: "Despite our finest offers, the government has refused our petition to house some of the "
 fo_noble_flight.16.a: "Damn them!"

 fo_noble_flight.100.title: "Finalizing the journey"
 fo_noble_flight.100.desc: "The time has come and the ships are stocked. The fleet, led by the Exodus and it's leader [SituationView.GetActiveSituation.GetSituation.MakeScope.GetVariable('current_leader').GetValue|2], finally leaves their stations across the empire meeting up off the coast of Achaea."
 fo_noble_flight.100.a: "The journey has begun..."

