l_english:
  fo_fifth_odyssey.1.title: "The Fifth Odyssey"
  fo_fifth_odyssey.1.desc: "The current situation in the Roman empire is dire to say the least. Turks in Anatolia, Crusader states in Greece, The Serbians to the northwest, and the Bulgarians to the northeast just to speak on foreign threats. Internally we have succession issues along with horribly corrupt estates and constant revolts.\n\nDire is an understatement.\n\nFortunately, the minor nobleman Dēmêtrios Hodēgetes descovered ancient texts describing a land to the west of the pillars of Hercules. A land that might be a place to escape from all the turmoil here.\nUnfortunately, he passed away late last night leaving his three children, his daughter Eirēnê and two sons Aléxios and Nikiphóros. After deliberation between the three, Eirēnê will continue to lead the Exodus and they all will work together to achieve their father's goal to help his kin to find safety and prosperity."
  fo_fifth_odyssey.1.a: "We must look forward"

  fo_fifth_odyssey.20.title: "Nobles want to join us"
  fo_fifth_odyssey.20.desc: "A number of nobles from various parts of the empire have come together to try to persuade us to let them join our escape.\nWhile there are not that many, any people we can get can help, especially if they are willing to pitch in..."
  fo_fifth_odyssey.20.a: "All are welcome"
  fo_fifth_odyssey.20.aa: "20 Nobles join us in our journey"
  fo_fifth_odyssey.20.b: "All are welcome, for an admission fee"
  fo_fifth_odyssey.20.bb: "10 Nobles join us in our jouney"
  fo_fifth_odyssey.20.c: "Tell them to pay for entry, but dont tell them when we leave"
  fo_fifth_odyssey.20.cc: "No additional Nobles join us"
  fo_fifth_odyssey.20.d: "Refuse them entry"
  fo_fifth_odyssey.21.title: "The Clergy join us"
  fo_fifth_odyssey.21.desc: "A number of clergymen from various parts of the empire have come together to try to persuade us to let them join our escape.\nWhile there are not that many, any people we can get can help, especially if they are willing to pitch in..."
  fo_fifth_odyssey.21.a: "All are welcome"
  fo_fifth_odyssey.21.aa: "50 Clergy join us in our journey"
  fo_fifth_odyssey.21.b: "All are welcome, for an admission fee"
  fo_fifth_odyssey.21.bb: "25 Clergy join us in our jouney"
  fo_fifth_odyssey.21.c: "Tell them to pay for entry, but dont tell them when we leave"
  fo_fifth_odyssey.21.cc: "No additional Clergy join us"
  fo_fifth_odyssey.21.d: "Refuse them entry"
  fo_fifth_odyssey.22.title: "Burghers join us to seek out new opportunities"
  fo_fifth_odyssey.22.desc: "A number of burghers from various parts of the empire have come together to try to persuade us to let them join our escape.\nWhile there are not that many, any people we can get can help, especially if they are willing to pitch in..."
  fo_fifth_odyssey.22.a: "All are welcome"
  fo_fifth_odyssey.22.aa: "50 Burghers join us in our journey"
  fo_fifth_odyssey.22.b: "All are welcome, for an admission fee"
  fo_fifth_odyssey.22.bb: "25 Burghers join us in our jouney"
  fo_fifth_odyssey.22.c: "Tell them to pay for entry, but dont tell them when we leave"
  fo_fifth_odyssey.22.cc: "No additional Burghers join us"
  fo_fifth_odyssey.22.d: "Refuse them entry"
  fo_fifth_odyssey.23.title: "Commoners leave fields to join us"
  fo_fifth_odyssey.23.desc: "A number of commoners from various parts of the empire have come together to try to persuade us to let them join our escape.\nWhile there are not that many, any people we can get can help, especially if they are willing to pitch in..."
  fo_fifth_odyssey.23.a: "All are welcome"
  fo_fifth_odyssey.23.aa: "100 Peasants join us in our journey"
  fo_fifth_odyssey.23.b: "All are welcome, for an admission fee"
  fo_fifth_odyssey.23.bb: "50 Peasants join us in our jouney"
  fo_fifth_odyssey.23.c: "Tell them to pay for entry, but dont tell them when we leave"
  fo_fifth_odyssey.23.cc: "No additional Peasants join us"
  fo_fifth_odyssey.23.d: "Refuse them entry"
  fo_fifth_odyssey.24.title: "Noble investment"
  fo_fifth_odyssey.24.desc: "A noble family has approached our organization with a proposition, they will give us a payment and workers in exchange for their places saved on the expedition.\n\nTheir workers, while willing to join the journey, remain loyal to their lords and will not leave without them."
  fo_fifth_odyssey.24.a: "Accept their proposition"
  fo_fifth_odyssey.24.aa: "10 Nobles and 100 Laborers join us"
  fo_fifth_odyssey.24.b: "The price for us is too steep"
  fo_fifth_odyssey.24.bb: "Nothing happens"
  fo_fifth_odyssey.25.title: "The art of the deal"
  fo_fifth_odyssey.25.desc: "A group of traders have made us an offer; They get to come with us and in exchange they give us money and ships for the journey.\n\nA pretty good deal, all things considered."
  fo_fifth_odyssey.25.a: "Take them up on that offer"
  fo_fifth_odyssey.25.aa: "50 Burghers Join us in our journey"
  fo_fifth_odyssey.25.b: "It's unnecessary"
  fo_fifth_odyssey.25.bb: "Nothing happens"
  fo_fifth_odyssey.26.title: "Bretheren seek help"
  fo_fifth_odyssey.26.desc: "Fellow greeks from the Frankokratic realms have come to us pleading for help. Their way of life bacvk home is threatened by their French and Catalan rulers and the collapse of the empire seems to be around the corner.\nOur plan is the only chance they have to keep safe.\n\nThere is a flaw, their home country know where they went and if we dont send them back, we may face diplomatic repercussions..."
  fo_fifth_odyssey.26.a: "We can't abandon our kin"
  fo_fifth_odyssey.26.aa: "100 Peasants join us in our journey"
  fo_fifth_odyssey.26.b: "We can't risk their ire"
  fo_fifth_odyssey.26.bb: "Nothing happens"
  fo_fifth_odyssey.27.title: "A call from Turkish lands"
  fo_fifth_odyssey.27.desc: "We've recieved word from the anatolian greeks currently being subjegated by the Turks. They request rescue from their conqurerors clutches and ask to join us.\n\nIn order to get them ready for the journey preparations must be made in secret behind the backs of the Turks. Preperations that will be costly, but potentially worthwhile.\n\nOn the other hand if we refuse them and report them as dissidents to the Turks we may ingratiate ourselves, giving us more room to recruit in secret..."
  fo_fifth_odyssey.27.a: "We will not let the cost stop us from helping our own!"
  fo_fifth_odyssey.27.aa: "300 Peasants join us in our journey"
  fo_fifth_odyssey.27.b: "It feels wrong, but to make an omelette..."
  fo_fifth_odyssey.27.bb: "Nothing happens"
  fo_fifth_odyssey.28.title: "A deal with the devil"
  fo_fifth_odyssey.28.desc: "A bank has approached us, knowing our funding needs, and offered a truely predatory loan.\n\nWe really shouldn't take it, but maybe we don't have to pay them back?"
  fo_fifth_odyssey.28.a: "Accept the loan"
  fo_fifth_odyssey.28.b: "We are not that desperate"
  fo_fifth_odyssey.28.bb: "Nothing happens"
  fo_fifth_odyssey.29.title: "Unrest among the ranks"
  fo_fifth_odyssey.29.desc: "Everyday that goes by is another day closer to the fall of the empire and the end of our way of life. Members from all walks of life are growing more and more uneasy and as a result many have left our ranks."
  fo_fifth_odyssey.29.a: "Their loss"
  fo_fifth_odyssey.30.title: "Nobles at our door"
  fo_fifth_odyssey.30.desc: "The nobles who have donated to our cause have come knocking demanding a refund of what they paid as well as keeping their spot on our expedition."
  fo_fifth_odyssey.30.a: "Fine, here"
  fo_fifth_odyssey.30.b: "No refunds"
  fo_fifth_odyssey.30.bb: "10% of the additional Nobles leave the expedition"
  fo_fifth_odyssey.31.title: "Donations"
  fo_fifth_odyssey.31.desc: "Members of the clergy who have donated to our cause have decided we are taking to long and they want a refund as well as their place on the expedition"
  fo_fifth_odyssey.31.a: "Forgive me father"
  fo_fifth_odyssey.31.b: "No refunds"
  fo_fifth_odyssey.31.bb: "10% of the additional Clergy leave the expedition"
  fo_fifth_odyssey.32.title: "Just business"
  fo_fifth_odyssey.32.desc: "Multiple traders and business owners have come forward demanding that we either pay back what they are owed or they will leave the expedition. They seem to be under the impression that the money they gave us was a loan and not a donation the cause, but our explantions are falling on deaf ears."
  fo_fifth_odyssey.32.a: "We need their business"
  fo_fifth_odyssey.32.b: "It was never a loan, we don't have to pay a single gold"
  fo_fifth_odyssey.32.bb: "10% of the additional Burghers leave the expedition"
  fo_fifth_odyssey.33.title: "The commons"
  fo_fifth_odyssey.33.desc: "Representatives of the common folk have come forward to petition us to give them their money back or they walk. While this isn't a whol lot of money, it still is money better spent elsewhere..."
  fo_fifth_odyssey.33.a: "Keep the change"
  fo_fifth_odyssey.33.b: "Don't let the door hit you on the way out"
  fo_fifth_odyssey.33.bb: "10% of the additional Commoners leave the expedition"

  fo_fifth_odyssey.40.entry: "The Romanyoti"
  fo_fifth_odyssey.40.title: "The Romanyoti"
  fo_fifth_odyssey.40.desc: "One afternoon while working in her study, there was a knocking on Lady XX's door. \"My lady\", her butler tells her. \"You have some rather, unorthodox guests.\" He seemed proud of himself for that, but the lady was interested.\nEntering the lobby she saw an older man in heavy robes wearing a small cap attop his head. \"It's not everyday I meet a Rabbi. Lady XX, how can I help you?\". The man smiled, seemingly not used to being recieved nicely. \"It is an honor, I'm Rabbi XX. I'm here representing my people of this city. Through our networks we have heard about your families goal of fleeing the empire.\"\n\"I trust you're not here to blackmail us.\"\n\"On the contrary, we've talked it over and we want in. We've gathered donations from all the members and we're prepared to pay for ourselves.\"\n\"Can I ask why your interested? Usually there's at least a little convincing we have to do on our side to recruit.\"\n\"We have... Limited rights within the Empire, and if the new emperor is of a more zealous breed than we will lose what little we have. We see the writing on the walls and it has never been good for our people. We have seen how your group has been hesitant to include the clergy among your ranks and... well.. Thought you might be open to our plea.\"\n\"Is this a simple paying for your place? Or do you have your own requests?\"\n\"We do not wish to be told to convert, and we would not dare to attempt to convert back. Just the ability to live free as citizens. If that is too much to ask we are more than willing to travel with assist in anyway we can on the voyage, and then when we arrive we seperate and go our own way.\"\nThe lady sat for a moment in her thoughts, if she were to accept this offer there would be no way to convice them to stay if she later invited Orthodox Clergy to join. But this was an enticing offer, the Romanyoti included a large number of traders and craftsmen surely with the wealth and means to help with the journey..."
  fo_fifth_odyssey.40.a: "For now, welcome aboard"
  fo_fifth_odyssey.40.aa: "200 Romanyoti join us in our journey and we can get further events to gain more so long as we do not invite any Clergy"
  fo_fifth_odyssey.40.b: "Sorry, but we'll have to pass"
  fo_fifth_odyssey.40.bb: "You will not get another chance"
  fo_fifth_odyssey.41.title: "Betrayal of the Romanyoti"
  fo_fifth_odyssey.41.desc: "The Romanyoti who have joined us has discovered that we have invited Orthodox Clergymen and have sent a letter describing their dissapointment but their understanding. Hoping the best for our mission."
  fo_fifth_odyssey.41.a: "Now I just feel bad"
  fo_fifth_odyssey.41.aa: "The Romanyoti members have left and we can no longer get any more"
  fo_fifth_odyssey.42.title: "Growth of the Romanyoti"
  fo_fifth_odyssey.42.desc: "Rabbi XX has been netwoking amongst his people, travelling across the empire raising funds and recruiting more to join the effort."
  fo_fifth_odyssey.42.a: "It's nice to have someone take the initiative"
  fo_fifth_odyssey.42.aa: "100 Romanyoti join us in our journey"
  fo_fifth_odyssey.43.entry: "Ill tidings"
  fo_fifth_odyssey.43.title: "Ill tidings"
  fo_fifth_odyssey.43.desc: "There haves been news from far to the north east, deep in the lands of the Golden Horde. A plague like nothing ever seen before has started spreading, making smallpox look like the common cold. Another problem to add to the list of encrouching threats, but one that has already prooved itself a true danger. We must leave before it spreads to us"
  fo_fifth_odyssey.43.a: "God help us"
  fo_fifth_odyssey.43.aa: "If we leave while any location we are present in has The Black Death we will bring it to the new world"
  fo_fifth_odyssey.44.title: "Death follows"
  fo_fifth_odyssey.44.desc: "We left the old world while it was still being decimated by the horrific illness called the Black Death. We thought ourselves flee of the plight, but we simply delayed it as somehow, someway, it followed us and as we all came together in our new home many fell victem to the disease and we lacked any infrastructure to protect ourselves.\nWe weren't even the only victims, our neighbors have sent word of infection amung their own.\n\nWe have brought Death to the new world."
  fo_fifth_odyssey.44.a: "May god forgive us"

  fo_fifth_odyssey.50.entry: "Stolen Knowledge"
  fo_fifth_odyssey.50.title: "Stolen knowledge"
  fo_fifth_odyssey.50.desc: "In 1202 the Pope called for a cruade against the Ayyubid Sultanate in order to reclaim Jerusalem. Economic and political events led the Cruasade into Byzantine lands cuminating with the Sack of Constantinople.\nNone of that was thought to be of any importance to us and our mission, however word has gotten around a store of books and scrolls held by a wealthy family that was taken from the Great Library that was destroyed in the siege. We do not know just what these books contain, it could be tax records, or it could be the holy grail of knowledge, the recipe for Greek fire, Roman Cement, or even possibly architectural plans for Aquaducts and Colosseums.\nWe do not possess the swway to force them to give us what is rightfully greek, but if it's one language the Venetians know it's money. Worst case is we make a plan to steal it from under them..."
  fo_fifth_odyssey.50.a: "We will recover what is ours"
  fo_fifth_odyssey.50.aa: "You gain the ability to use actions in the situation panel to either to buy Ancient Knowledge from Venice or to steal it from them."
  fo_fifth_odyssey.51.title: "A ship arrives"
  fo_fifth_odyssey.51.desc: "We sent our offer to the venetian family that posseses our peoples ancient knowledge and after an obserdly long wait, they have sent their reply in the form of a large ship entering port in Thessaloniki and expecting payment. We recieved more than we expected, possibly more than we will even be able to go through before we leave on our voyage..."
  fo_fifth_odyssey.51.a: "We will bring it all with us if we have too"
  fo_fifth_odyssey.51.aa: "Unlocks events that will give us advances and institutions for free once we land."
  fo_fifth_odyssey.52.title: "Books upon Books"
  fo_fifth_odyssey.52.desc: "The operation was successful and our agents were able to flee from Venice without a single trace. By the time they relize we have it we will already be safe in our new home across the sea."
  fo_fifth_odyssey.52.a: "What fools!"
  fo_fifth_odyssey.53.title: "Failure"
  fo_fifth_odyssey.53.desc: "Our operation to steal our knowledge back from under the noses of the Venetians has failed and they now fully know we were the ones responsible.\nLuckily, despite the Empire teetering on the edge of collapse it is still strong enough and we in the Emperor's favor to be protected for now..."
  fo_fifth_odyssey.53.a: "What fools..."
  fo_fifth_odyssey.53.aa: "We will not be able to try again."

  fo_fifth_odyssey.54.entry: "Horses?"
  fo_fifth_odyssey.54.title: "Horses?"
  fo_fifth_odyssey.54.desc: "A member of our crew has come forward with a strange idea, they say that they cannot say why, but it is imperative that we bring horses with us on our voyage and they have organized a way for us to buy a large number of breeding pairs.\nThe rest of the crew is incredulous, What is their goal? Regardless of the why, the cost will be incredible..."
  fo_fifth_odyssey.54.a: "Sure, they might be useful"
  fo_fifth_odyssey.54.b: "We appreciate the offer, but no"

  fo_fifth_odyssey.55.entry: "Byzantine Silk"
  fo_fifth_odyssey.55.title: "Byzantine Silk"
  fo_fifth_odyssey.55.desc: "Long have the Byzantines kept their method of creating Silk a secret. Rumor has it, though, that it was just as a closely guarded secret where the technique origininated far to the east before it was stolen.\nSilk is a luxary, not a necessity, but bringing the tools and resources to start production can possibly give us an economic advantage in the future."
  fo_fifth_odyssey.55.a: "Get ready for our arrival, worms"
  fo_fifth_odyssey.55.aa: "You gain the ability to use actions in the situation panel to either to buy Silk production methods from the Byzantines or to steal it from them."
  fo_fifth_odyssey.56.title: "The benevolence of the Basileus"
  fo_fifth_odyssey.56.desc: "The Byzantine Emperor has graciously, after some convincing, granted us the worms and tools necessary to start production."
  fo_fifth_odyssey.56.a: "He will never see it, but we thank him all the same"
  fo_fifth_odyssey.56.aa: "After we get ourselves situated economically, we will be able to produce silk"
  fo_fifth_odyssey.57.title: "A successful heist"
  fo_fifth_odyssey.57.desc: "Manpower, money, and time has gone into this heist of ours, but it has all come to fruition as the crew sent in to retrive everything returns with everthing we could ever need."
  fo_fifth_odyssey.57.a: "All this for some worms?"
  fo_fifth_odyssey.58.title: "Absolute Failure"
  fo_fifth_odyssey.58.desc: "Despite our efforts, the Empire's defenses just were too strong, and our attempts at stealing the secrets of Byzantine Silk have just ended with us making enemies of the Empire.\nThe only thing protecting us from jail is our status, even then we need to push up our schedule..."
  fo_fifth_odyssey.58.a: "We'll never hear the end of this..."
  fo_fifth_odyssey.58.aa: "We'll never get Silk"

  fo_fifth_odyssey.100.title: "The Voyage begins"
  fo_fifth_odyssey.100.desc: "After so much time, and effort. Blood and tears. Our leader has made the call for all members of the voyage to gather at their designated ports and for their ships to take to the sea, eventually to meet up off the coast of Sicily.\n\nWe don't know what awaits us, but anything is better than here..."
  fo_fifth_odyssey.100.a: "Pray for safety"
  fo_fifth_odyssey.101.title: "The meeting point"
  fo_fifth_odyssey.101.desc: "The first leg of the voyage is finished as the crew of the Flagship of our fleet finally lands in the Sicilian port of Saragusa.\nAs we wait, day by day, more and more ships arrive to add to our final fleet. Not every single person is accounted for, some have seemingly stayed behind and some new faces have joined us, but when the last ships join we spend our last night on land for what we predict is a very long time before heading out westward."
  fo_fifth_odyssey.101.a: "Onward"
  fo_fifth_odyssey.102.title: "Pirates"
  fo_fifth_odyssey.102.desc: "While for the most part we've travelled by the coast to proved some safe harbour if needed, it was decided to travel directly across the sea from Sardinia to Mallorca. A decision the crew would soon come to regret.\n\n A few days into our travel we were met by a fleet of ships flying no flag. Some among our members recognize the makes of the ships as North african, and sure enough they were taking aggressive actions aggainst us."
  fo_fifth_odyssey.102.a: "We will not be slaves"
  fo_fifth_odyssey.102.aa: "We lose nothing."
  fo_fifth_odyssey.102.b: "Perhaps they will take money?"
  fo_fifth_odyssey.102.bb: "We spend money but lose nothing else."
  fo_fifth_odyssey.102.c: "Flee!"
  fo_fifth_odyssey.102.cc: "We lose 75% of our money and 10% of our people."
  fo_fifth_odyssey.103.title: "The Pillars of Hercules"
  fo_fifth_odyssey.103.desc: "Before we have even left the Mediterranean we have faced conflict, but we still push forward. A month after our conflict with the North Africans we have finally made it to the true start of our journey. The Pillars of Hercules owned on one side by Catholic Castillians and Sunni Andalusians and Sunni Moroccans on the other. Unluckily for us it seems the Moroccans were the first to find us, approachin the ship and seeing our people a man came forth speaking to us in greek demanding we pay the toll or face capture. The toll itself being more money than we even could have brought with us.\nMany of our people talked in quiet about attempting to fight, but after our ordeal with the pirates we may have no other choice...\n\nLuckily, while the Moroccans found us first, the Spanish found us quickly enough and scaredm away our blackmailers before they could do any damage. The Spanish admiral asked just what our plan is and after deliberation we simply told them the truth. The Admiral looked on in astonishment, but we couldn't tell if he was impressed or felt sympathy, and he decided to help guide us until the Canaries, but nothing more.\n\nOne of their ships set off back to port and we pushed forward."
  fo_fifth_odyssey.103.a: "Plus Ultra, as they say"
  fo_fifth_odyssey.104.title: "The Portuguese"
  fo_fifth_odyssey.104.desc: "It seems that the news of our mission started with the ship returning to Spain and spread to their neighbor to the west Portugal, as when we passed the town of Faro a Portuguese ship apporached us and atold us the King of Portugal has requested a meeting in exchange for a restock. This was an easy decision to make as even though we had prepared for a long journey, having extra has never hurt anyone.\n\nHaving just left the Spanish fleet, and guided by the Portuguese ship we entered the port of Lisboa and as the ship was being restocked, our leader and her brothers appeared before the King where he made them a request:\nSend back a ship to give them news on what we discover and we will be handsomely rewarded.\n\nHe made it clear that this deal is seperate from the restocking, but our leaders arte hesitant to make promises. The king has a certain glint in his eye that unnerves them. The could accept the offer, but that doesn't mean that they have to tell the truth..."
  fo_fifth_odyssey.104.a: "Tell them the truth"
  fo_fifth_odyssey.104.aa: "We will send word about the new world when we arrive, giving the Portuguese a large bonus to gaining the New World institution."
  fo_fifth_odyssey.104.b: "Tell them we were attacked by indestructable sea monsters"
  fo_fifth_odyssey.104.bb: "We will send back a small ship with people who regret making the journey. Allowing them to stay in Europe and lie to the Portuguese, making them afraid to attempt to follow us."
  fo_fifth_odyssey.105.title: "Losing Hope"
  fo_fifth_odyssey.105.desc: "It has been a long time since Portugal and no sign of land. Many of our people are growing restless. What if Plato was wrong and there is no land west of the Pillars? What if the Earth IS Flat? What if this, what if that. Despite tour leaders holding true to their goal externally, internally even they have doubts..."
  fo_fifth_odyssey.105.a: "God help us"
  fo_fifth_odyssey.105.b: "Perhaps God has abandoned us..."
  fo_fifth_odyssey.105.bb: "Because we didn't bring any Clergy, we have no religious cornerstone and we may face conversions."
  fo_fifth_odyssey.106.title: "The Storm"
  fo_fifth_odyssey.106.desc: "Just when morale was at an all-time low, storm clouds were spotted on the horizon. People panicked, and despite us not having the food stores remaining to allow us to return, a ship mutinied and fled back home.\n\nThen, the storm hit."
  fo_fifth_odyssey.106.a: "It's always darkest before the dawn"
  fo_fifth_odyssey.107.title: "Lights in the sky"
  fo_fifth_odyssey.107.desc_a: "It felt like it lasted for days, but eventually it did end as all things do. A head count revealed that far fewer people died than it was thought and many members openly prayed and thanked God for protecting them. as the celebrations went on, our navigators begun to spot lights floating around the ship, like torches guiding the ship. Many of the pious amung us began to call them St Elmo's Fire, a guide to land that we MUST follow."
  fo_fifth_odyssey.107.desc_b: "It felt like it lasted for days, but eventually it did end as all things do. A head count revealed that far fewer people died than it was thought and many members openly prayed and thanked their God or gods. It seems the fear of death combined with our acceptence have emboldened many who had doubts in the Orthodox Church to allow themselves fully to worship their true faith openly.\nWhether this will lead to a secular golden age or a religious war in our new home is yet to be seen... Regardless, as the celebrations went on, our navigators begun to spot lights floating around the ship, like torches guiding the ship. The most religious of ours from all faiths agreed to follow them."
  fo_fifth_odyssey.107.a: "May St. Elmo guide our path"
  fo_fifth_odyssey.107.b: "Hellene? St Elmo? I just want to see land again..."
  fo_fifth_odyssey.108.title: "Land Ho"
  fo_fifth_odyssey.108.desc: "After nearly a year of travel, our navigator called from their crow's nest the news everyone wanted, no needed to hear.\n\nLand was spotted and after a few hours of travel we made it to the coastline. We weighed anchor and sent out smaller craft to search nearby. We may be happy to find land, but we aren't so desperate that we'll live at the first place we find.\n\nA few more hours later and the scouts returned, first southward seems to be a number of river outles, then northward; A large bay of sorts, the perfect place to land. Finally our land scouts arrive back with news that shocks us all to our core. There are people living here already...\n\nWe make our way to the bay and hope for the best."
  fo_fifth_odyssey.108.a: "Time to start building"

