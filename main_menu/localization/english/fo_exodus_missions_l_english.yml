l_english:
  fo_exodus_pack: "The Voyage"
  fo_exodus_pack_BUTTON_DETAILS: "Let us prepare to make our journey. Many have tried and failed before us, but we will not."
  fo_exodus_pack_BUTTON_TOOLTIP: "Let us prepare to make our journey. Many have tried and failed before us, but we will not."
  fo_exodus_pack_CRITERIA_DESCRIPTION: "Our voyage is ready to begin."
  fo_exodus_pack_DESCRIPTION: "We must make preperations to leave the Empire behind."

  task_noblebonuses: "A Noble Goal"
  task_noblebonuses_desc: "We are the inheritors of the Empire"
  task_clergybonuses: "A Clerical Error"
  task_clergybonuses_desc: "While abandoning our kin is not exactly what Jesus would do, we have gathered a large number of Clergymen and philosophers in our efforts to leave our crumbling empire."
  task_burgherbonuses: "Burghers go well with Fries"
  task_burgherbonuses_desc: "While it is difficult to convice members of the Clergy to join us, and the Nobles have a lot to lose. Burghers have everything to gain by joining us; New land, new riches, and most importantly, less entrenched competition."
  task_commonerbonuses: "Kneel Peasants!"
  task_commonerbonuses_desc: "The easiest group to convince is the average member of the empire. Crushed by tyranny of the crown and nobles alike, forced to work their lives away for wealth they themselves will never see. All we had to do is promise them emancipation from serfdom and they were more than happy to join.\n\nNow, whether we keep that promise is entirely up to us."
  task_soldierbonuses: "An army fit for a colony!"
  task_soldierbonuses_desc: "Bringing any group of people brings with it potential dangers, biggest of all is their belief that because they had power in the empire, that means they should have power in our new home as well. The wealthier of our members might even bring their own private guards and soldiers to ensure their power is kept.\n\nWhich is why we must also follow suit to ensure we keep control of our investment."
