l_english:
  fo_exodus_pack: "The Voyage"
  fo_exodus_pack_BUTTON_DETAILS: "Let us prepare to make our journey. Many have tried and failed before us, but we will not."
  fo_exodus_pack_BUTTON_TOOLTIP: "Let us prepare to make our journey. Many have tried and failed before us, but we will not."
  fo_exodus_pack_CRITERIA_DESCRIPTION: "Our voyage is ready to begin."
  fo_exodus_pack_DESCRIPTION: "We must make preperations to leave the Empire behind."

  task_opinionbyz: "Relations with the Empire"
  task_opinionbyz_desc: "In order to expand our reach and recruit members of all walks of life, we need to get in the good graces of the Emperor.\n\n[In order to build recruitment buildings within a country you need that country to have at least 100 opinion of you.]"
  task_opiniontur: "Relations with the Turks"
  task_opiniontur_desc: "While getting along with the Emperor is important, The Ottomans who is currently the strongest of the Turkish Beyliks, currently still has a large Greek population. If we ingratiate ourselves to them we might be able to steal away our people from under their nose.\n\n[You can build recruitment buildings in any country that has 100 opinion of you as well as any location that has a majority greek population. The culture or religion of the country doesn't matter.]"
  
  task_buildnoble: "The Nobles"
  task_buildnoble_desc: "Regardless of origin, Nobles are powerful. Commanding large amounts of power, influence, and important for us; Money.\n\n[Noble recruitment provides the most gold per month but even small amount of them can hold a lot of power and are difficult to please.]"
  task_buildclergy: "The Clergy"
  task_buildclergy_desc: "It is more difficult to convince the devout to join our cause, but having the backing of members of the church can go a long way.\n\n[Clergy are slightly easier to build up compared to the nobles but provide signicantly less gold. Whether they are worth it is up to you.]"
  task_buildburgher: "The Burghers"
  task_buildburgher_desc: "The Burghers make up the backbone of a functioning econmy and as a result it is paramount to bring enough along to kickstart ours.\n\n[Burghers provide more gold than Clergy but not as much as the Nobles. But unlike the Nobles, upon landing you can get events based on the number of Bughers brought along that will boost your starting economy.]"
  task_buildcommoner: "The Commonfolk"
  task_buildcommoner_desc: "While they may not have much power, all kingdoms and empires would fall without the common man.\n\n[The easiest group to build up and the one that provides the least amount of money. Despite that, it is the most important group of all, bring as many as you can.]"
  task_buildsoldier: "The Soldiers"
  task_buildsoldier_desc: "While we may not be a country now, our goal at the end of our voyage is to plant our own flag and begin anew. As such it is paramount that we have an army to back up our authority.\n\n[Each estate gains power the more you bring up to a limit of 300% and the next task after each is the halfway point to that amount. The next Soldier task is different, when you have enough soldiers to complete that task when you arrive 150% power at max will be removed to each estate.]"
  
  task_noblebonus: "A Noble Goal"
  task_noblebonus_desc: "We have gathered a large group of Nobles who are willing to fund our jounrey and leave with us.\n\n[The Nobles will now begin with a special privilidge and 150% power when landing.]"
  task_clergybonus: "A Clerical Error"
  task_clergybonus_desc: "While abandoning our kin is not exactly what Jesus would do, we have gathered a large number of Clergymen and philosophers in our efforts to leave our crumbling empire.\n\n[The Clergy will now begin with a special privilidge and 150% power when landing.]"
  task_burgherbonus: "Burghers and Fries"
  task_burgherbonus_desc: "While it is difficult to convice members of the Clergy to join us, and the Nobles have a lot to lose. Burghers have everything to gain by joining us; New land, new riches, and most importantly, less entrenched competition.\n\n[The Burghers will now begin with a special privilidge and 150% power when landing.]"
  task_commonerbonus: "Kneel Peasants!"
  task_commonerbonus_desc: "The easiest group to convince is the average member of the empire. Crushed by tyranny of the crown and nobles alike, forced to work their lives away for wealth they themselves will never see. All we had to do is promise them emancipation from serfdom and they were more than happy to join.\n\nNow, whether we keep that promise is entirely up to us.\n\n[The Commoners will now begin with a special privilidge and 150% power when landing.]"
  task_soldierbonus: "Single-nation Army"
  task_soldierbonus_desc: "Bringing any group of people brings with it potential dangers, biggest of all is their belief that because they had power in the empire, that means they should have power in our new home as well. The wealthier of our members might even bring their own private guards and soldiers to ensure their power is kept.\n\nWhich is why we must also follow suit to ensure we keep control of our investment.\n\n[We will gain a special reform and all estates will start with 150% less power.]"
  
  task_nobleover: "Ignoble"
  task_nobleover_desc: "The nobles we have brought are now ordering us around as if they are the leaders, not us... Maybe they're right?\n\n[The Nobles will begin with 300% power when landing.]"
  task_clergyover: "Unholy"
  task_clergyover_desc: "The church is commanding subserviance beyond what was agreed, with a new Patriarch already being selected.\n\n[The Clergy will begin with 300% power when landing.]"
  task_burgherover: "Greedy"
  task_burgherover_desc: "When we went through our ledger we found hole after hole, and a little digging revealed the Burghers have been taking full advantage of us to deepen their pockets more and more. What good even is gold where we're going?\n\n[The Burghers will begin with 300% power when landing.]"
  task_commonerover: "Tyrannical"
  task_commonerover_desc: "What started as bringing enough commoners to support large scale aggriculture has balooned into so many voices all stating their desire for a slice of the cake.\n\n[The Commoners will begin with 300% power when landing.]"

  task_noblebonuses: "A Noble Goal"
  task_noblebonuses_desc: "We are the inheritors of the Empire"
  task_clergybonuses: "A Clerical Error"
  task_clergybonuses_desc: "While abandoning our kin is not exactly what Jesus would do, we have gathered a large number of Clergymen and philosophers in our efforts to leave our crumbling empire."
  task_burgherbonuses: "Burghers go well with Fries"
  task_burgherbonuses_desc: "While it is difficult to convice members of the Clergy to join us, and the Nobles have a lot to lose. Burghers have everything to gain by joining us; New land, new riches, and most importantly, less entrenched competition."
  task_commonerbonuses: "Kneel Peasants!"
  task_commonerbonuses_desc: "The easiest group to convince is the average member of the empire. Crushed by tyranny of the crown and nobles alike, forced to work their lives away for wealth they themselves will never see. All we had to do is promise them emancipation from serfdom and they were more than happy to join.\n\nNow, whether we keep that promise is entirely up to us."
  task_soldierbonuses: "An army fit for a colony!"
  task_soldierbonuses_desc: "Bringing any group of people brings with it potential dangers, biggest of all is their belief that because they had power in the empire, that means they should have power in our new home as well. The wealthier of our members might even bring their own private guards and soldiers to ensure their power is kept.\n\nWhich is why we must also follow suit to ensure we keep control of our investment."
