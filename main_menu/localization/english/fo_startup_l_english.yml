l_english:
 # Events
 fo_startup.1.title: "Fifth's Odyssey"
 fo_startup.1.desc: "The year is 1337 and the Empire is a shadow of its former self. A bureaucracy eating itself from the inside while the serbians push from the northwest, the Bulgarians from the northeast, the people of greece are coming to resent our rule and to the southeast the Turks grow in power, threatening our rule.\n\nThe emperor himself is sure of a revival, the rising of the Purple Pheonix where we will take back the empire. Even the most fervant supporters are hesitant and unrest is growing. What will her enemies do to the citizens of the empire? Will we get to live in peace? Subjegated as slaves? or slaughtered where we stand?"
 fo_startup.1.a: "We must do something!"
 fo_startup.1.b: "We're worrying too much..."

 fo_startup.2.title: "A plan?"
 fo_startup.2.desc: "Old greek stories have been unearthed, written in a language similar but different to our own. Stories written by the greeks of antiquity about a land far beyond the Pillars of Hercules. A land who's hubris caused them to get buried beneath the waves. Could that actually happen? Or is it the superstitions of our precursers getting the better of them."
 fo_startup.2.a: "Perhaps there's some truth to them"

 fo_startup.3.title: "Who shall leave"
 fo_startup.3.desc: "In a future update the leaving sequence will be more tailored to fit which you choose.\nRight now you just choose one.\n\nHave fun!"
 fo_startup.3.a: "We must protect the lineage of the Empire!"
 fo_startup.3.aa: "The Nobles will prepare the exile"
 fo_startup.3.b: "The Church must not fall to the star and crescent!"
 fo_startup.3.bb: "The Clergy will prepare the exile"
 fo_startup.3.c: "The wealth of the empire must not fall into enemy hands!"
 fo_startup.3.cc: "The Burghers will prepare the exile"
 fo_startup.3.d: "The Greek people refuse to be ruled by foreigners!"
 fo_startup.3.dd: "The Commoners will prepare the exile"
 fo_startup.3.e: "We must return back to the old ways!"
 fo_startup.3.ee: "The Tribemen will prepare the exile"

 fo_startup.empty: "No content"



